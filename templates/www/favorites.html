{% extends "base.html" %}
{% load static %}

{% block title %}ИЗБРАННОЕ{% endblock %}

{% block content %}
<section class="favorites-section">
    <div class="container">
        <h1 class="page-title">ИЗБРАННОЕ</h1>
        <div class="favorites-products-grid animate-on-scroll" id="favorites-grid">
        </div>
        <p id="empty-msg" style="text-align:center; padding:50px; display: block;">У вас пока нет избранных товаров</p>
    </div>
</section>
    
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>ОФОРМЛЕНИЕ ЗАКАЗА</h2>
        
        <div id="productInfo" class="product-info"></div>
        
        <form id="orderForm" class="order-form">
            <div class="form-group">
                <input type="text" id="name" placeholder="ИМЯ" required>
            </div>
            <div class="form-group">
                <input type="tel" id="phone" placeholder="НОМЕР ТЕЛЕФОНА" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="EMAIL (необязательно)">
            </div>
            <div class="form-group">
                <textarea id="comment" placeholder="КОММЕТАРИЙ К ЗАКАЗУ..." rows="3"></textarea>
            </div>
            <button type="submit" class="order-btn">ОТПРАВИТЬ</button>
        </form>
        
        <div id="successMessage" class="success-message" style="display: none;">
            <p>СПАСИБО ЗА ЗАКАЗ!</p>
            <p>Мы свяжемся с вами в ближайшее время</p>
        </div>
    </div>
</div>

<script>
var modal = document.getElementById("orderModal");
var closeBtn = document.querySelector(".close");
var orderForm = document.getElementById("orderForm");
var successMessage = document.getElementById("successMessage");
var productInfo = document.getElementById("productInfo");

function openOrderModal(itemName, itemPrice, itemImage, itemType) {
    modal.style.display = "block";
    orderForm.style.display = "flex";
    successMessage.style.display = "none";
    
    var infoHtml = `<strong>${itemName}</strong><br>`;
    if (itemPrice) {
        infoHtml += `<span style="color: #0D1845FF; font-size: 18px; margin: 10px 0; display: block;">${itemPrice}</span>`;
    }
    if (itemImage) {
        infoHtml += `<img src="${itemImage}" alt="${itemName}">`;
    }
    if (itemType) {
        infoHtml += `<p style="margin-top: 10px; color: #FF5983FF;">${itemType}</p>`;
    }
    productInfo.innerHTML = infoHtml;
}

if (closeBtn) {
    closeBtn.onclick = function() { modal.style.display = "none"; }
}
window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

if (orderForm) {
    orderForm.onsubmit = function(e) {
        e.preventDefault();
        orderForm.style.display = "none";
        successMessage.style.display = "block";
        orderForm.reset();
        setTimeout(function() { modal.style.display = "none"; }, 3000);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const favGrid = document.getElementById('favorites-grid');
    const emptyMsg = document.getElementById('empty-msg');
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    
    function renderFavorites() {
        favGrid.innerHTML = '';
        const currentProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
        
        if (favorites.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        } else {
            emptyMsg.style.display = 'none';
        }

        favorites.forEach(id => {
            const product = currentProducts.find(p => p.id == id);
            
            if (product) {
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                        <div class="card-actions">
                            <button class="cart-add-btn" data-product="${product.id}" title="Добавить в корзину">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                            </button>
                            <button class="fav-btn active" data-product="${product.id}" title="Удалить из избранного">
                                <svg class="heart-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-category">${product.category}</p>
                        <div class="product-bottom">
                            <span class="product-price">${product.price}</span>
                            <a href="#" class="product-btn">ЗАКАЗАТЬ</a>
                        </div>
                    </div>
                `;
                favGrid.appendChild(card);
            }
        });
        
        if (favGrid.children.length === 0 && favorites.length > 0) {
            emptyMsg.innerHTML = "Данные о товарах обновились. Пожалуйста, добавьте их снова из каталога.";
            emptyMsg.style.display = 'block';
        }
    }

    renderFavorites();
    
    favGrid.addEventListener('click', function(e) {
        const favBtn = e.target.closest('.fav-btn');
        if (favBtn) {
            e.preventDefault();
            const productId = favBtn.dataset.product;
            favorites = favorites.filter(f => f != productId);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            favBtn.closest('.product-card').remove();
            if (favorites.length === 0) {
                emptyMsg.style.display = 'block';
            }
            return;
        }

        const cartBtn = e.target.closest('.cart-add-btn');
        if (cartBtn) {
            e.preventDefault();
            const productId = cartBtn.dataset.product;
            const card = cartBtn.closest('.product-card');
            
            const productData = {
                id: productId,
                name: card.querySelector('.product-title').textContent.trim(),
                price: card.querySelector('.product-price').textContent.trim(),
                image: card.querySelector('.product-image img').src,
                quantity: 1
            };
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push(productData);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Товар добавлен в корзину!');
            return;
        }

        const orderBtn = e.target.closest('.product-btn');
        if (orderBtn) {
            e.preventDefault();
            const card = orderBtn.closest('.product-card');
            const title = card.querySelector('.product-title').textContent;
            const price = card.querySelector('.product-price').textContent;
            const img = card.querySelector('.product-image img').src;
            openOrderModal(title, price, img, 'Товар из избранного');
        }
    });
});
</script>
{% endblock %}
